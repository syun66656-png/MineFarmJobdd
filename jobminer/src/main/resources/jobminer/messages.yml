# ─────────────────────────────────────────────────────────────────────────────
# JobMiner 출력 메시지 모음 (수정만 하면 코드 변경 없이 적용됨)
# - &로 시작하는 마인크래프트 색 코드를 지원합니다.
# - {keyword} 형태의 플레이스홀더는 각 메시지마다 다릅니다 (주석 참고).
# - 빈 문자열로 두면 해당 메시지는 출력되지 않습니다.
# ─────────────────────────────────────────────────────────────────────────────
messages:
  # ── 광부 직업 선택 ─────────────────────────────────────────────────────────
  miner-job-selected: "&6[직업] &f광부 직업을 선택했습니다."

  # ── 다이너마이트 (시프트 + 우클릭) ─────────────────────────────────────────
  # {level}    : unlock 레벨
  # {seconds}  : 남은 쿨타임 (초)
  dynamite-level-denied: "&c[광부] &f직업 레벨 {level} 이상부터 다이너마이트를 사용할 수 있습니다."
  dynamite-cooldown: "&c[광부] &f다이너마이트 쿨타임: {seconds}초"
  dynamite-thrown: "&e[광산] &f다이너마이트 설치!"

  # ── 오버클럭 (우클릭) ──────────────────────────────────────────────────────
  # extension-success: {seconds} 연장 초, {chance} 발동 확률(%)
  # extension-failure: {chance} 발동 확률(%)
  overclock-level-denied: "&c[광부] &f직업 레벨이 맞지 않아 오버클럭을 사용할 수 없습니다."
  overclock-cooldown: "&c[광부] &f오버클럭 쿨타임 중입니다."
  overclock-extension-success: "&e[광부] &f오버클럭 &a+{seconds}초 &f연장!"
  overclock-extension-failure: "&7[광부] &f연장 실패 &8({chance}%)"
  # 액션바 (남은 시간 표시) — {seconds}: 남은 초
  overclock-action-bar: "&6&l오버클럭 &7| &e{seconds}초"

  # ── 광산 완드 (/광산완드) ─────────────────────────────────────────────────
  # {material} 채굴 블록 종류 / {x},{y},{z} 좌표
  wand-not-in-region: "&c[광산] &f이 위치는 광산 지역(WorldGuard)이 아니므로 등록/해제할 수 없습니다."
  wand-updated: "&e[광산] &f리젠 블록 정보를 갱신했습니다. &7({material} @ {x}, {y}, {z})"
  wand-registered: "&a[광산] &f리젠 블록을 등록했습니다. &7({material} @ {x}, {y}, {z})"
  wand-unregistered: "&c[광산] &f리젠 블록 등록을 해제했습니다."
  wand-not-found: "&7[광산] &f등록되지 않은 블록입니다."
  wand-given: "&a[광산] &f관리 완드를 지급했습니다. &7(좌클릭: 등록, 우클릭: 해제)"

  # ── 광산 초기화 (/광산초기화) ─────────────────────────────────────────────
  # {count} 복구된 블록 수 / {material} Material 이름
  mine-reset-all: "&a[광산] &f전체 리젠 블록 &e{count}개&f를 복구했습니다."
  mine-reset-player-only: "&c플레이어만 블록 단위 초기화를 사용할 수 있습니다. 전체는 &f/광산초기화 all"
  mine-reset-no-target: "&c[광산] &f바라보는 블록이 없습니다."
  mine-reset-not-regen: "&c[광산] &f리젠 블록이 아닙니다."
  mine-reset-success: "&a[광산] &f블록을 즉시 복구했습니다. &7({material})"
  mine-reset-no-world: "&c[광산] &f월드를 찾을 수 없어 복구하지 못했습니다."

  # ── 광부 보호 / 채굴 제한 ────────────────────────────────────────────────
  protection-regen-restoring: "&c[광산] &f광물이 복구 중입니다. 잠시 후 다시 시도하세요."
  protection-pickaxe-required: "&c[광산] &f광부 직업과 허용된 곡괭이가 있어야 채굴할 수 있습니다."
  protection-cannot-place: "&c[광산] &f리젠 블록 위치에는 블록을 설치할 수 없습니다."

  # ── 광부 상점 (/광부상점) ─────────────────────────────────────────────────
  # {item}/{amount}/{price}: 단품 판매 / {count}/{total}: 전체 판매
  shop-player-only: "&c플레이어만 사용할 수 있습니다."
  shop-profile-loading: "&7프로필을 불러오는 중입니다. 잠시 후 다시 시도해주세요."
  shop-not-miner: "&c광부 직업만 상점을 이용할 수 있습니다."
  shop-no-vault: "&c경제 플러그인(Vault)이 설치되어 있지 않아 상점을 이용할 수 없습니다."
  shop-sell-success: "&a[상점] &f{item} &7{amount}개 판매 → &6+{price}골드"
  shop-sell-all: "&a[상점] &f총 {count}종 판매 → &6+{total}골드"
  shop-no-items: "&c인벤토리에 판매 가능한 광석이 없습니다."
  shop-vault-error: "&c입금 오류가 발생했습니다. 관리자에게 문의하세요."
  shop-item-not-found: "&c{item}이(가) 인벤토리에 없습니다."
  shop-no-price: "&c해당 아이템은 판매할 수 없습니다."

  # ── 자동판매 ───────────────────────────────────────────────────────────
  # {summary} 판매 요약 / {total_price} 합계
  autosell-summary: "&a[자동판매] &f{summary} &8→ &6+{total_price}골드"

  # ── 공통 ────────────────────────────────────────────────────────────
  no-permission: "&c권한이 없습니다."
  player-only: "&c플레이어만 사용할 수 있습니다."
