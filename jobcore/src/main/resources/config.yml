# JobCore 공통 설정

# true: Velocity 프록시용 Plugin Messaging 채널 등록 (minefarm:jobcore)
# false: 일반 Paper/Spigot 단독 서버 — 채널·프록시 로직 미사용
velocity-support: false

database:
  host: localhost
  port: 3306
  database: minefarm_job
  username: root
  password: ""
  pool-size: 10
  connection-timeout-ms: 30000

job-change-cooldown-days: 10

leveling:
  # 다음 레벨 필요 경험치 = base-exp-required × 현재 레벨
  base-exp-required: 100
  # 최대 레벨 (이 레벨 도달 후 경험치 누적 없음)
  max-level: 100
  # 레벨업 1회당 지급할 스탯 포인트
  stat-points-per-level: 1

# 바닐라 경험치 구슬 차단 (직업 EXP는 DB/플러그인 전용)
experience:
  block-vanilla-orbs: true

stats:
  max-level: 25

ranking:
  # 매시 :00, :30 비동기 DB 갱신 (RankingService)
  enabled: true
  # 직업별 랭킹 상위 N명만 조회 (메모리 절약)
  top-n: 100

async-save:
  flush-interval-ticks: 100
  shutdown-timeout-seconds: 30
