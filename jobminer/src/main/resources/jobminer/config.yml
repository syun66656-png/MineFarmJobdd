# JobMiner 전용 설정 (JobCore와 분리)

# ─────────────────────────────────────────────────────────────────────────────
# WorldGuard 통합 (광산 시스템 전체에 적용)
# allowed-regions: 광산 시스템이 작동할 WorldGuard 리전(region) ID 목록.
#   비어 있으면 제한 없음 → 어디서나 등록·채굴·드롭·스킬·패시브 모두 작동.
#   목록이 있으면 해당 리전 안에서만 작동:
#     - /광산완드 좌/우클릭으로 리젠 블록 등록·해제 가능
#     - 등록된 리젠 블록 채굴 시 보상 지급 (리전 밖이면 일반 블록처럼 취급)
#     - 다이너마이트 폭발은 리전 안 광석에만 보상 적용
#     - 광부 패시브(가벼운 발걸음 Speed) 효과 유지
#   WorldGuard 미설치 시: 검사 비활성 (목록이 있어도 무시되고 모든 곳에서 작동).
# ─────────────────────────────────────────────────────────────────────────────
worldguard:
  allowed-regions: []
  # 예시:
  # allowed-regions:
  #   - "mining_zone"
  #   - "deep_mine"

# ─────────────────────────────────────────────────────────────────────────────
# 광부 스킬 — 광부 곡괭이가 트리거 아이템 (allowed_pickaxe_keywords 매칭)
#   시프트 + 우클릭 → 다이너마이트
#   일반 우클릭     → 오버클럭
# 두 스킬 모두 worldguard.allowed-regions 안에서만 발동.
# ─────────────────────────────────────────────────────────────────────────────

# 다이너마이트 (시프트 + 우클릭) — 제자리에 TNT 설치 후 fuse-ticks 만에 폭발
# 지형은 파괴하지 않고 리젠 블록(광물)만 보상 처리.
dynamite:
  enabled: true
  unlock-level: 30                      # 30레벨부터 해금
  fuse-ticks: 50                        # 2.5초 (20틱=1초)
  cooldown-ticks: 100                   # 5초
  # 폭발 반경 (블록). blockList()에 의존하지 않고 직접 스캔하므로
  # WorldGuard나 다른 보호 플러그인이 폭발 블록 데미지를 차단해도 광물 보상은 정상 지급됨.
  explosion-radius: 4
  # 폭발 시 플레이어/엔티티 데미지·넉백 제거 (true 권장 — 발 밑 폭발로 솟구치지 않음)
  disable-knockback: true
  # SKILL 스탯 1레벨당 cooldown 감소 (예: 0.02 = 2%/레벨)
  cooldown-reduction-per-skill: 0.02
  cooldown-reduction-cap: 0.5           # 최대 감소율 (50%)
  level-denied-message: "&c[광부] &f직업 레벨 {level} 이상부터 다이너마이트를 사용할 수 있습니다."
  cooldown-message: "&c[광부] &f다이너마이트 쿨타임: {seconds}초"

# 오버클럭 (우클릭) — Haste 효과 부여
# SKILL 스탯 효과:
#   • 쿨다운 감소  : 1레벨당 cooldown-reduction-per-skill 만큼 감소 (최대 cap)
#   • 지속시간 증가: 1레벨당 duration-bonus-per-skill 만큼 증가 (최대 cap)
overclock:
  enabled: true
  unlock-level: 1                       # 1레벨부터 해금
  cooldown-ticks: 600                   # 기본 30초
  duration-ticks: 200                   # 기본 10초
  max-job-level: 999
  haste-amplifier: 1                    # Haste II

  # ── SKILL 스탯 보너스 ────────────────────────────────────────────────────
  cooldown-reduction-per-skill: 0.02    # 1레벨당 cooldown -2%
  cooldown-reduction-cap: 0.5           # 최대 -50%
  duration-bonus-per-skill: 0.02        # 1레벨당 duration +2%
  duration-bonus-cap: 1.0               # 최대 +100% (2배)

  # ── 발동 사운드 ──────────────────────────────────────────────────────────
  activation-sound: ENTITY_BLAZE_SHOOT  # 화염구 발사 사운드
  activation-sound-volume: 1.0
  activation-sound-pitch: 1.0

  # ── 80레벨 메카닉: active 중 재사용 시 확률로 지속시간 연장 ──────────────
  # SKILL 스탯에 따라 확률·연장량 모두 증가.
  extension-unlock-level: 80
  extension-base-chance: 0.5            # 기본 50% 확률
  extension-chance-per-skill: 0.005     # SKILL 1레벨당 +0.5%p
  extension-chance-cap: 1.0             # 최대 100%
  extension-base-ticks: 100             # 기본 +5초
  extension-ticks-per-skill: 2          # SKILL 1레벨당 +0.1초
  extension-ticks-cap: 200              # 최대 +10초
  extension-success-message: "&e[광부] &f오버클럭 &a+{seconds}초 &f연장!"
  extension-failure-message: "&7[광부] &f연장 실패 &8({chance}%)"

  cooldown-message: "&c[광부] &f오버클럭 쿨타임 중입니다."
  level-denied-message: "&c[광부] &f직업 레벨이 맞지 않아 오버클럭을 사용할 수 없습니다."

# ─────────────────────────────────────────────────────────────────────────────
# 스타터 킷 — 광부 직업 선택 시 자동 지급
# 지원 필드:
#   material      : Bukkit Material 이름 (대소문자 무관), 필수
#   amount        : 수량 (기본 1, 최대 64)
#   name          : 표시 이름 (&색코드 지원)
#   lore          : 아이템 설명 줄 목록 (&색코드 지원)
#   enchantments  : 인챈트 목록 (이름: 레벨)
#                   지원: efficiency, unbreaking, fortune, silk_touch, mending,
#                         sharpness, protection, fire_protection, blast_protection,
#                         feather_falling, thorns, looting …
#   slot          : 배치 슬롯 지정 (없으면 자동 배치)
#                   숫자(0~35) | hand | offhand | helmet | chestplate | leggings | boots
#   unbreakable   : true 시 내구도 소모 없음 (기본 false)
#   custom-model-data: 커스텀 모델 데이터 숫자 (리소스팩 연동용)
# ─────────────────────────────────────────────────────────────────────────────
starter-kit:
  items:
    # 기본 철 곡괭이
    - material: IRON_PICKAXE
      amount: 1
      name: "&6광부 곡괭이"
      lore:
        - "&7리젠 광산 채굴용"
        - "&8인챈트: 효율 II · 내구도 II"
      enchantments:
        efficiency: 2
        unbreaking: 2
      slot: hand          # 주 손에 바로 장착

    # 예시 — 다이아 곡괭이 (주석 처리된 상태)
    # - material: DIAMOND_PICKAXE
    #   amount: 1
    #   name: "&b&l다이아 광부 곡괭이"
    #   lore:
    #     - "&7고급 리젠 광산 전용"
    #     - "&e특수 능력: 채굴 시 EXP +30%"
    #   enchantments:
    #     efficiency: 4
    #     unbreaking: 3
    #     fortune: 2
    #     mending: 1
    #   slot: hand
    #   unbreakable: false

    # 예시 — 음식/소모품
    # - material: COOKED_BEEF
    #   amount: 16
    #   name: "&c광부 도시락"
    #   lore:
    #     - "&7채굴 중 체력 회복용"

    # 예시 — 갑옷 직접 장착
    # - material: LEATHER_HELMET
    #   name: "&7광부 헬멧"
    #   slot: helmet

# 접속·직업 선택·스탯 투자 후 DB 프로필 반영 시 적용 (메인 스레드)
miner-passives:
  # (Legacy) 패시브 전용 리전 — 상단 worldguard.allowed-regions 가 비어 있을 때만 사용됨.
  # 보통은 상단 worldguard.allowed-regions 하나로 통합 관리하는 것을 권장.
  allowed-regions: []
  light-footsteps:
    enabled: true
    unlock-level: 50                    # 50레벨부터 해금
    # amplifier = min(cap, base-amplifier + SKILL스탯×per-skill-level + 직업레벨×per-job-level), 0=이속 I
    base-amplifier: 0
    per-skill-level: 1
    per-job-level: 0
    amplifier-cap: 3

allowed_pickaxe_keywords:
  - "광부 곡괭이"
  - "Miner Pickaxe"

regen:
  delay-seconds: 30
  # 채굴 후 대기 시간 동안 표시할 대체 블록 (true 시 즉시 교체, delay-seconds 후 원본 복구)
  replacement-enabled: true
  replacement-material: COBBLESTONE

regen-wand:
  material: GOLDEN_AXE
  display-name: "&6광산 관리 완드"
  lore:
    - "&7좌클릭: 리젠 블록 등록"
    - "&7우클릭: 리젠 블록 해제"

autosell:
  notify-player: true
  # 확률 = min(max-chance, base-chance + chance-per-level × 자동판매 스탯 레벨)
  base-chance: 0.05
  chance-per-level: 0.02
  max-chance: 0.80
  message: "&a[자동판매] &f{summary} &8→ &6+{total_price}골드"

sell:
  # total_price = base + (base × bonus-multiplier × sell 스탯 레벨)
  bonus-multiplier: 0.05

# ─────────────────────────────────────────────────────────────────────────────
# 광물별 지정 드롭 (채굴된 블록 종류에 따라 다른 드롭 100% 지급)
# 형식:
#   ore-drops:
#     <블록 Material>:
#       - material: <드롭 Material>
#         amount: <수량>
#         name: "<&색 이름>"           # 선택
#         lore: ["<&색 설명>"]         # 선택
#         custom-model-data: <번호>    # 선택 (리소스팩 모델 연동)
#         shop-price: <단가>           # 선택 — 자동판매(AutoSell)용 단가 (광부상점 GUI는 shop-gui.items 정의를 우선 사용)
#
# 광부상점 매칭은 (material + custom-model-data + name) 기준.
# 즉 동일 Material이라도 custom-model-data 또는 name이 다르면 별개 아이템.
# ─────────────────────────────────────────────────────────────────────────────
ore-drops:
  COAL_ORE:
    - { material: COAL, amount: 1 }
  DEEPSLATE_COAL_ORE:
    - { material: COAL, amount: 2 }
  IRON_ORE:
    - { material: RAW_IRON, amount: 1 }
  DEEPSLATE_IRON_ORE:
    - { material: RAW_IRON, amount: 2 }
  COPPER_ORE:
    - { material: RAW_COPPER, amount: 1 }
  DEEPSLATE_COPPER_ORE:
    - { material: RAW_COPPER, amount: 2 }
  GOLD_ORE:
    - { material: RAW_GOLD, amount: 1 }
  DEEPSLATE_GOLD_ORE:
    - { material: RAW_GOLD, amount: 2 }
  LAPIS_ORE:
    - { material: LAPIS_LAZULI, amount: 4 }
  DEEPSLATE_LAPIS_ORE:
    - { material: LAPIS_LAZULI, amount: 6 }
  REDSTONE_ORE:
    - { material: REDSTONE, amount: 4 }
  DEEPSLATE_REDSTONE_ORE:
    - { material: REDSTONE, amount: 6 }
  DIAMOND_ORE:
    # 예시: 커스텀 모델 + 광부상점 단가 매칭
    - material: DIAMOND
      amount: 1
      name: "&b&l반짝이는 다이아"
      lore:
        - "&7깊은 광맥에서만 채굴됨"
      custom-model-data: 1001
      shop-price: 150
  DEEPSLATE_DIAMOND_ORE:
    - material: DIAMOND
      amount: 1
      name: "&b&l반짝이는 다이아"
      lore:
        - "&7깊은 광맥에서만 채굴됨"
      custom-model-data: 1001
      shop-price: 160
  EMERALD_ORE:
    - { material: EMERALD, amount: 1 }
  DEEPSLATE_EMERALD_ORE:
    - { material: EMERALD, amount: 1 }
  NETHER_GOLD_ORE:
    - { material: GOLD_NUGGET, amount: 6 }
  NETHER_QUARTZ_ORE:
    - { material: QUARTZ, amount: 1 }
  ANCIENT_DEBRIS:
    - { material: ANCIENT_DEBRIS, amount: 1 }

# ─────────────────────────────────────────────────────────────────────────────
# 모든 광물에서 공통으로 등장하는 확률 드롭 (강화석/초월석/유물 등)
# 형식 (ore-drops와 동일 — custom-model-data, shop-price 지원):
#   - material: <Material>
#     amount: <수량>
#     chance: <0.0~1.0>
#     name: "<이름>"             # 선택
#     lore: ["<설명>"]           # 선택
#     custom-model-data: <번호>   # 선택
#     shop-price: <단가>          # 선택
# 광물별 ore-drops 와 함께 추가로 굴려진다.
# ─────────────────────────────────────────────────────────────────────────────
common-drops:
  - material: PRISMARINE_SHARD
    amount: 1
    chance: 0.05
    name: "&b강화석"
    lore:
      - "&7장비 강화에 사용되는 결정"
    custom-model-data: 2001
    shop-price: 50
  - material: NETHER_STAR
    amount: 1
    chance: 0.01
    name: "&5&l초월석"
    lore:
      - "&7최상급 강화에 필요한 보석"
      - "&8매우 희귀"
    custom-model-data: 2002
    shop-price: 500
  - material: HEART_OF_THE_SEA
    amount: 1
    chance: 0.001
    name: "&6&l유물"
    lore:
      - "&7전설의 광부만이 만나는 보물"
      - "&8극희귀"
    custom-model-data: 2003
    shop-price: 5000

# ─────────────────────────────────────────────────────────────────────────────
# (Deprecated, 호환 유지) 광물 무관 100% 드롭 — 가능하면 ore-drops 사용 권장
# ─────────────────────────────────────────────────────────────────────────────
# (Deprecated, 호환 유지) 광물 무관 확률 드롭 — 가능하면 common-drops 사용 권장
# ─────────────────────────────────────────────────────────────────────────────
# 광부 상점 GUI (/광부상점)
# ─────────────────────────────────────────────────────────────────────────────
# 각 슬롯은 두 부분으로 정의:
#   display: GUI 표시용 (자유롭게 — 로어 안에 플레이스홀더 사용 가능)
#   sell:    실제 판매 매칭 기준 (인벤토리 아이템 ↔ material + custom-model-data + name)
#
# 사용 가능 플레이스홀더 (display.lore / display.name 에서):
#   {base-price}      sell.unit-price (기본 단가)
#   {my-price}        SELL스탯 적용 단가 = base × (1 + bonus-multiplier × SELL)
#   {my-amount}       내 인벤토리의 매칭 아이템 총 수량
#   {expected-total}  my-price × my-amount
#   {sell-stat}       내 SELL 스탯 레벨
#   {bonus-percent}   bonus-multiplier × SELL × 100 (예: 25면 +25%)
#
# 판매 동작:
#   슬롯 클릭 시 sell 정의 (material+cmd+name) 와 인벤토리 ItemStack을 매칭하여
#   일치하는 모든 ItemStack을 합산해 판매 (GUI 아이콘의 표시값과는 무관).
# ─────────────────────────────────────────────────────────────────────────────
shop-gui:
  title: "&6&l광부 상점"
  size: 54
  notify-on-sell: true
  sell-message: "&a[상점] &f{item} &7{amount}개 판매 → &6+{price}골드"
  sell-all-message: "&a[상점] &f총 {count}종 판매 → &6+{total}골드"
  no-items-message: "&c인벤토리에 판매 가능한 광석이 없습니다."
  vault-error-message: "&c입금 오류가 발생했습니다. 관리자에게 문의하세요."

  # 레이아웃(고정 버튼) — slot 음수면 비활성
  layout:
    sell-all:
      slot: 49
      material: LIME_STAINED_GLASS_PANE
      name: "&a&l★ 전체 판매"
      lore:
        - "&7인벤토리의 판매 가능 아이템을 모두 판매합니다."
        - ""
        - "&e▶ 클릭"
    close:
      slot: 53
      material: BARRIER
      name: "&c✕ 닫기"
    filler:
      # 지정 슬롯 외 빈 공간 채울 머티리얼 (비우려면 이 항목 자체 제거)
      material: BLACK_STAINED_GLASS_PANE
      name: " "

  # 카탈로그 슬롯들 — 각 슬롯 = display + sell
  items:
    diamond:
      slot: 11
      display:
        material: DIAMOND
        name: "&b&l반짝이는 다이아"
        lore:
          - "&7기본 단가: &6{base-price}골드/개"
          - "&7내 단가:   &a{my-price}골드/개 &7({sell-stat}lvl)"
          - "&7보유 수량: &f{my-amount}개"
          - "&7예상 수익: &6+{expected-total}골드"
          - ""
          - "&e▶ 좌클릭으로 전량 판매"
        custom-model-data: 1001
      sell:
        material: DIAMOND
        name: "&b&l반짝이는 다이아"
        custom-model-data: 1001
        unit-price: 150

    coal:
      slot: 12
      display:
        material: COAL
        name: "&f석탄"
        lore:
          - "&7기본 단가: &6{base-price}골드/개"
          - "&7내 단가:   &a{my-price}골드/개"
          - "&7보유 수량: &f{my-amount}개"
          - "&7예상 수익: &6+{expected-total}골드"
          - ""
          - "&e▶ 클릭하여 전량 판매"
      sell:
        material: COAL
        unit-price: 8

    enhance-stone:
      slot: 20
      display:
        material: PRISMARINE_SHARD
        name: "&b강화석"
        lore:
          - "&7장비 강화에 사용되는 결정"
          - ""
          - "&7기본 단가: &6{base-price}골드/개"
          - "&7내 단가:   &a{my-price}골드/개"
          - "&7보유:      &f{my-amount}개"
          - "&7예상 수익: &6+{expected-total}골드"
          - ""
          - "&e▶ 클릭하여 전량 판매"
        custom-model-data: 2001
      sell:
        material: PRISMARINE_SHARD
        name: "&b강화석"
        custom-model-data: 2001
        unit-price: 50

# 광물 채굴 시 지급할 직업 경험치 (min~max 랜덤 범위)
# key: Bukkit Material 이름 (대/소문자 무관)
# value: "min~max" 또는 고정값 숫자
# 리젠 블록이 해당 Material인 경우에만 적용됩니다.
# 예) COAL_ORE: "10~20"  → 10~20 사이 랜덤
#     DIAMOND_ORE: 500    → 항상 500
mine-exp:
  COAL_ORE: "10~20"
  DEEPSLATE_COAL_ORE: "12~25"
  IRON_ORE: "20~35"
  DEEPSLATE_IRON_ORE: "25~40"
  COPPER_ORE: "15~28"
  DEEPSLATE_COPPER_ORE: "18~32"
  GOLD_ORE: "40~60"
  DEEPSLATE_GOLD_ORE: "45~70"
  LAPIS_ORE: "35~55"
  DEEPSLATE_LAPIS_ORE: "40~65"
  REDSTONE_ORE: "30~50"
  DEEPSLATE_REDSTONE_ORE: "35~55"
  DIAMOND_ORE: "150~250"
  DEEPSLATE_DIAMOND_ORE: "180~300"
  EMERALD_ORE: "120~200"
  DEEPSLATE_EMERALD_ORE: "140~230"
  NETHER_GOLD_ORE: "30~50"
  NETHER_QUARTZ_ORE: "25~40"
  ANCIENT_DEBRIS: "400~600"
  STONE: "1~3"

# 유물(RELIC) 스탯 효과 설정
# 광산 채굴 시 드롭 수량에 추가 보너스를 적용합니다.
# bonus-drop-chance: RELIC 스탯 레벨당 추가 드롭 발동 확률 (0.0~1.0)
# bonus-drop-amount: 추가 드롭 발동 시 guaranteed-drops 수량에 곱할 배수
# max-bonus-amount: 최대 추가 드롭 수량 (0 = 무제한)
relic:
  # RELIC 1레벨당 +2% 확률로 guaranteed-drops가 한 번 더 지급
  bonus-drop-chance-per-level: 0.02
  # 추가 드롭 시 드롭 수량 곱배수 (1.0 = 동량, 1.5 = 1.5배)
  bonus-drop-multiplier: 1.0
  # RELIC 스탯 레벨당 mine-exp 경험치 추가 배율 (+2%/레벨)
  exp-bonus-per-level: 0.02
